name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        # Using @v4 is usually enough, but sometimes forcing a cache clear or 
        # checking for a newer major version (like @v5 if released) is needed.
        uses: actions/checkout@v4 

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Permission
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SpeakMate-debug
          path: app/build/outputs/apk/debug/app-debug.apk