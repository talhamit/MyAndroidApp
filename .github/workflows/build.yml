name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4   # updated

      - name: Setup Java
        uses: actions/setup-java@v4  # updated
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Permission
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4   # 🔥 FIXED HERE
        with:
          name: SpeakMate-debug
          path: app/build/outputs/apk/debug/app-debug.apk